<section class="p-6">
  <h2 class="text-2xl font-bold text-blue-900 mb-6">Mis Próximas Citas</h2>
  
  <div class="space-y-4">
    @for (cita of citas(); track cita.id) {
      <div class="bg-white p-4 rounded-xl border border-sky-100 shadow-sm flex justify-between items-center">
        <div>
          <p class="font-bold text-blue-800">Fecha: {{ cita.fecha_hora_inicio | date:'short' }}</p>
          <p class="text-sm text-gray-600">Estado: <span class="font-semibold">{{ cita.estado }}</span></p>
        </div>
        <div class="text-right">
          <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">
            {{ cita.estado }}
          </span>
        </div>
      </div>
    } @empty {
      <p class="text-blue-400">No tienes citas programadas actualmente.</p>
    }
  </div>
</section>
